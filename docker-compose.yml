version: '2'
services:
  simple-node-app:
    image: ashish00234/node-app-3:v5.0 
    container_name: node-app-3
    ports:
      - 3005:3000
  mongo:
    image: mongo:7.0
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER_NAME}
      MONGO_INITDB_ROOT_PASSWORD:  ${MONGODB_PASSWORD}

  mongo-express:
    image: mongo-express          
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGODB_USER_NAME} 
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGODB_PASSWORD}
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_SITE_BASEURL: /mongo-express       

    depends_on:
      - "mongo"

