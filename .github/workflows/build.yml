name: build-workflow
on:
  workflow_call:

jobs:
  build:
    strategy:
      matrix:
       os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
        - uses: actions/checkout@v5
        - name: use node 22
          uses: actions/setup-node@v5
          with:
             node-version: '22'
        - name: install dependencies
          run: npm install
        - name: build
          run:  npm run build
        - name: build artifact
          uses: actions/upload-artifact@v4
          with:
            name: build-file-${{ matrix.os }}
            path: build
  
