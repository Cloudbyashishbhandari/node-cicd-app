name: node-ci/cd
env:
   FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  push:
    branches:
        - develop
        - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@v5
        - name: use node 22
          uses: actions/setup-node@v5
          with:
            node-version: '22'
        - name: install dependencies
          run : npm install
        - name: install express
          run: npm install express
        - name: build
          run:  npm run build
        - name: upload-artifact
          uses: actions/upload-artifact@v4
          with:
            name: build-file
            path: build
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
        - uses: actions/download-artifact@v4
          with:
            name: build-file
        - run: echo "Running tests"
  Docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
        - uses: actions/checkout@v5
        - uses: actions/download-artifact@v4
          with:
            name: build-file

        - name: docker-loginn
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}
        - name: build docker image
          run: |
            docker build -t ashish00234/node-app:v2.0 .
            docker push ashish00234/node-app:v2.0 
  aws-login:
    runs-on: ubuntu-latest
    steps:
        - name: aws-login
          uses: aws-actions/configure-aws-credentials@v2
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: eu-north-1
  deploy-dev:
    runs-on: ubuntu-latest
    needs: Docker-build
    steps: 
        - name: setup ssh
          run: |
             mkdir -p ~/.ssh
             echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
             chmod 600 ~/.ssh/id_rsa
        - name: deploy to dev server
          if: github.ref == 'refs/heads/develop'
          run: |
              ssh -o StrictHostKeyChecking=no ubuntu@51.20.3.79 << 'EOF'
              sudo apt update -y
              sudo apt install docker.io -y
              sudo systemctl start docker 
              sudo docker pull ashish00234/node-app:v2.0
              sudo docker run -d -p 3000:3000 --name node-app ashish00234/node-app:v2.0
              EOF
           

  deploy-prod:
    runs-on: ubuntu-latest
    needs: Docker-build
    steps:
        - name: deploy to prod server
          if: github.ref == 'refs/heads/master'
          run: |
                ssh -o StrictHostKeyChecking=no ubuntu@13.60.236.129 << 'EOF'
                sudo docker pull ashish00234/node-app:v2.0
                sudo docker run -d --name node-app -p 3000:3000 ashish00234/node-app:v2.0
                sudo docker run node-app
                EOF





