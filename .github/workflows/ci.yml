name: node-ci/cd
env:
   ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
on:
  push:
    branches:
        - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@v5
        - name: use node 22
          uses: actions/setup-node@v3
          with:
            node-version: '22'
        - name: install dependencies
          run : npm install
