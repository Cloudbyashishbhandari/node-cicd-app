name: node-ci/cd

env:
   FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  push:
    branches:
        - master
jobs:
  build:
      uses: ./.github/workflows/build.yml
    # runs-on: ubuntu-latest
    # steps:
    #     - uses: actions/checkout@v5
    #     - name: use node 22
    #       uses: actions/setup-node@v5
    #       with:
    #         node-version: '22'
    #     - name: install dependencies
    #       run : npm install
    #     - name: install express
    #       run: npm install express
    #     - name: build
    #       run:  npm run build
    #     - name: upload-artifact
    #       uses: actions/upload-artifact@v4
    #       with:
    #         name: build-file
    #         path: build
  test:
      needs: build
      uses: ./.github/workflows/test.yml
    # runs-on: ubuntu-latest


    # strategy:
    #   matrix:
    #     node-version: [18, 20, 22]
    # needs: build
    # steps:
    #     - uses: actions/download-artifact@v4
    #       with:
    #         name: build-file
    #     - uses: actions/setup-node@v5
    #       with:
    #         node-version: ${{ matrix.node-version }}
    #     - run: echo "Running tests"
  Docker-build:
    runs-on: ubuntu-latest
    needs: [test, build]
    steps:
        - uses: actions/checkout@v5
        - uses: actions/download-artifact@v4
          with:
            name: build-file-ubuntu-latest

        - name: docker-loginn
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}
        - name: build docker image
          run: |
            docker build -t ashish00234/node-app-3:v4.0 .
            docker push ashish00234/node-app-3:v4.0 
  aws-login:
    runs-on: ubuntu-latest
    needs: Docker-build
    steps:
        - name: aws-login
          uses: aws-actions/configure-aws-credentials@v3
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: eu-north-1
  
  deploy-staging:
     needs: [ aws-login ]
     runs-on: ubuntu-latest
     environment: staging-2 
     steps:
        - uses: actions/checkout@v5
        - uses: ./.github/actions/setup-ssh
          with:
            ssh-key: ${{ secrets.EC2_SSH_KEY }}

        - run: |
            ls -l
            ssh -o StrictHostKeyChecking=no -i ashish_login.pem ubuntu@16.170.225.34 << 'EOF'
            sudo su 
            sudo cd /var/www/html
            sudo apt install docker.io -y
            sudo docker pull ashish00234/node-app-3:v4.0
            sudo docker run -d --name node-app-3 -p 127.0.0.1:3006:3000 ashish00234/node-app-3:v4.0    
            EOF
  deploy-production:
     needs: [ deploy-staging, aws-login ]
     runs-on: ubuntu-latest
     environment: production
     steps:
        - uses: actions/checkout@v5
        - uses: ./.github/actions/setup-ssh
          with: 
            ssh-key: ${{ secrets.EC2_SSH_KEY }}
        - run: |
            ssh -o StrictHostKeyChecking=no -i ashish_login.pem ubuntu@16.171.194.78 << 'EOF'
            sudo su
            sudo docker pull ashish00234/node-app-2:v2.0
            sudo docker run -d --name node-app-2 -p 3001:3000 ashish00234/node-app-2:v3.0
            echo "deployed to production"
            EOF

            





